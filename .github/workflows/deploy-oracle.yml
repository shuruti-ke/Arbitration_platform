name: Deploy Backend To Oracle VM

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-oracle.yml'

concurrency:
  group: oracle-backend-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_DIR: /home/opc/arbitration-platform
      PM2_NAME: arbitration-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        shell: bash
        run: |
          find src test scripts -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Run backend service tests
        run: npm run test:ci

      - name: Configure SSH
        env:
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
          ORACLE_VM_HOST: ${{ secrets.ORACLE_VM_HOST }}
        run: |
          test -n "$ORACLE_SSH_KEY"
          test -n "$ORACLE_VM_HOST"
          mkdir -p ~/.ssh
          printf '%s\n' "$ORACLE_SSH_KEY" > ~/.ssh/oracle_vm
          chmod 600 ~/.ssh/oracle_vm
          ssh-keyscan -H "$ORACLE_VM_HOST" >> ~/.ssh/known_hosts

      - name: Package backend
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/build' \
            --exclude='ignore' \
            --exclude='.env.oracle' \
            -czf backend-release.tgz src scripts package.json package-lock.json

      - name: Upload release
        env:
          ORACLE_VM_HOST: ${{ secrets.ORACLE_VM_HOST }}
          ORACLE_VM_USER: ${{ secrets.ORACLE_VM_USER || 'opc' }}
        run: |
          scp -i ~/.ssh/oracle_vm backend-release.tgz "$ORACLE_VM_USER@$ORACLE_VM_HOST:/tmp/backend-release.tgz"

      - name: Deploy and verify
        env:
          ORACLE_VM_HOST: ${{ secrets.ORACLE_VM_HOST }}
          ORACLE_VM_USER: ${{ secrets.ORACLE_VM_USER || 'opc' }}
        run: |
          ssh -i ~/.ssh/oracle_vm "$ORACLE_VM_USER@$ORACLE_VM_HOST" "
            set -e
            source /home/opc/.nvm/nvm.sh
            mkdir -p '$APP_DIR'
            cd '$APP_DIR'
            mkdir -p releases
            tar -czf releases/pre-deploy-\$(date +%Y%m%d%H%M%S).tgz src scripts package.json package-lock.json 2>/dev/null || true
            tar -xzf /tmp/backend-release.tgz -C '$APP_DIR'
            npm ci --omit=dev
            npm run migrate
            pm2 delete '$PM2_NAME' || true
            pm2 start src/index.js --name '$PM2_NAME' --cwd '$APP_DIR'
            pm2 save
            sleep 3
            curl -f http://127.0.0.1:3000/api/ready
          "
